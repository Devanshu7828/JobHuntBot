name: Daily Job Hunt

on:
  schedule:
    # 7:00 AM IST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run JobHuntBot
        run: python main.py --no-pdf
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-report-${{ github.run_id }}
          path: |
            output/jobs/
            logs/
          retention-days: 14
