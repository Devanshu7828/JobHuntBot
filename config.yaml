candidate:
  name: "Devanshu Rajak"
  email: "devanshurajak23@gmail.com"
  phone: "+91-7999856797"
  location: "Pune, India"
  linkedin: "linkedin.com/in/devanshu-rajak"
  github: "github.com/Devanshu7828"
  experience_years: 5

# Job search keywords — all combinations will be searched
search:
  keywords:
    - "QA Automation Engineer"
    - "SDET"
    - "Senior Test Engineer"
    - "Manual Testing Engineer"
    - "Manual QA Engineer"
    - "Manual Test Engineer"
    - "Software Test Engineer"
    - "QA Engineer"
    - "Selenium Java Test Engineer"
    - "QA Engineer Selenium"

  # Salary band filter (LPA = lakhs per annum)
  salary_filter:
    enabled: true
    min_lpa: 14
    max_lpa: 20
    include_undisclosed: true   # keep jobs when salary is not listed

  locations:
    - "Pune"
    - "Gurgaon"
    - "Remote"
    - "Bengaluru"
    - "Indore"
    - "Remote"

  experience_filter: "3-6 years"
  job_type: "Full Time"
  max_jobs_per_platform: 50

# Corporate network SSL fix (Amdocs/corporate proxy uses self-signed certs)
# Set to false if you get SSL CERTIFICATE_VERIFY_FAILED errors
verify_ssl: false

# Platforms to search (set enabled: false to skip)
platforms:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
    browser_channel: "msedge" # use installed Edge (bundled Chromium gets 403 from Naukri)
    headless: true # set false if you still see Access Denied errors
    page_timeout_ms: 30000
    max_keywords: 5 # limits searches per run (keywords × locations)
    max_locations: 5
  indeed:
    enabled: true # HTML scraping (selectors updated for 2025 layout)
    base_url: "https://in.indeed.com"
  hirist:
    enabled: true
    base_url: "https://www.hirist.tech"
    browser_channel: "msedge"
    headless: true
    page_timeout_ms: 30000
    max_keywords: 2
    max_locations: 3
  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com"
    browser_channel: "msedge"
    headless: true
    page_timeout_ms: 30000
    max_keywords: 2
    max_locations: 3
  shine:
    enabled: true
    base_url: "https://www.shine.com"
    max_keywords: 2
    max_locations: 3
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
    max_keywords: 2
    max_locations: 3
  wellfound:
    enabled: true
    base_url: "https://wellfound.com/jobs"
    browser_channel: "msedge"
    headless: false # Wellfound CDN blocks headless browsers (403)
    locale: "" # leave empty — any locale breaks Wellfound job rendering
    page_timeout_ms: 30000
    max_keywords: 2
  remotive:
    enabled: true
    base_url: "https://remotive.com"
  remoteok:
    enabled: true
    base_url: "https://remoteok.com"
  weworkremotely:
    enabled: true
    base_url: "https://weworkremotely.com"
  glassdoor:
    enabled: false
    base_url: "https://www.glassdoor.co.in/Job"

