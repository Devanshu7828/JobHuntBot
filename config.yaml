# Scoring weights (must add to 100)
scoring:
  primary_skill_match: 50 # % weight for primary skills match
  secondary_skill_match: 20 # % weight for secondary skills
  experience_match: 20 # % weight for experience range
  location_match: 10 # % weight for location preference
  role_relevance: 10 # bonus weight for title match when JD text is missing
  min_score_to_include: 35 # jobs below this score are ignored

# Resume paths
resume:
  # Structured resume used for tailoring + EthicsGuard validation
  base_resume_path: "resume/base_resume.json"
  # Your master ATS resume PDF — used when applying / as fallback
  master_resume_pdf: "C:/Users/rajakd/OneDrive - AMDOCS/Personal/Resume/DevanshuRajak_Senior_QA_Resume.pdf"
  # Tailor a JD-specific resume PDF for every job in the HTML report
  tailor_all: true
  tailor_max: 50          # safety cap per run (each job gets its own PDF)
  tailor_top: 5           # used only when tailor_all is false
  fetch_job_descriptions: true   # fetch full JD from job URL when missing
  output_dir: "output/resumes"
  pdf_template: "resume/template.py"

# Report settings
report:
  output_dir: "output/jobs"
  filename: "JobReport_{date}.html"
  open_browser_after_run: true
